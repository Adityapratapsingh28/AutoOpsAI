<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoOps AI — Sign In</title>
    <meta name="description" content="Enterprise-grade Multi-Agent AI Workflow Automation Platform">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="bg-mesh"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>⚡ AUTOOPS AI</h1>
                <p>Enterprise AI Workflow Automation</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Sign In</button>
                <button class="auth-tab" id="signupTab" onclick="switchTab('signup')">Create Account</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">Sign In</button>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="hidden" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" class="form-input" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" class="form-input" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" class="form-input" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="signupRole">Role</label>
                    <select id="signupRole" class="form-input">
                        <option value="employee">Employee</option>
                        <option value="manager">Manager</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg" id="signupBtn">Create Account</button>
            </form>

            <p id="authError" class="text-center text-sm mt-2 hidden" style="color: var(--error);"></p>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
